<div class="notification-service">
  @for (message of notificationService.messages$ | async; track message.id ) {
    <ng-container
      [ngTemplateOutlet]="serviceMessage"
      [ngTemplateOutletContext]="{ $implicit: message }"
    ></ng-container>
  }
</div>

<ng-template #serviceMessage let-message>
  <div class="notification">
    <div class="notification__left">
      <fa-icon [icon]="faMessage" size="xl"></fa-icon>
      <div class="notification__text">
        <h6 class="notification__title">{{ message.type }}</h6>
        <span class="notification__desc">{{ message.content }}</span>
      </div>
    </div>
    <button class="notification__close" (click)="closeMessage(message.id)" id="close-button" type="submit">
      <fa-icon [icon]="faXmark" class="xmark"></fa-icon>
    </button>
  </div>
</ng-template>
